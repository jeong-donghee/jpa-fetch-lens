# 타겟 IDE: IC = IntelliJ IDEA Community. Java PSI 만 쓰므로 Ultimate 불필요(Community/Ultimate 모두 호환).
platformType = IC
# 타겟 버전 핀 — 빌드가 안 맞으면 여기 숫자만 바꾸면 된다.
platformVersion = 2024.3.1

# 번들 플러그인 의존.
#  - com.intellij.java : 자바 PSI (엔티티/애노테이션 읽기)
#  - (v1 2단계에서 com.intellij.jpa 추가 예정 — @Query JPQL 파싱용)
platformBundledPlugins = com.intellij.java

# 이 플러그인이 지원하는 최소 빌드 (243 = 2024.3.x)
pluginSinceBuild = 243

org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.caching = true
